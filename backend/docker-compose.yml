x-backend-build-args: &backend-build-args
  ENVIRONMENT: ${ENVIRONMENT:-local}
  APP_NAME: ${APP_NAME:-FastAPI app}
  APP_DESCRIPTION: ${APP_DESCRIPTION:-}
  APP_VERSION: ${APP_VERSION:-}
  CONTACT_NAME: ${CONTACT_NAME:-}
  CONTACT_EMAIL: ${CONTACT_EMAIL:-}
  LICENSE_NAME: ${LICENSE_NAME:-}
  TERMS_VERSION: ${TERMS_VERSION:-v1}
  POSTGRES_USER: ${POSTGRES_USER:-postgres}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
  POSTGRES_SERVER: ${DOCKER_POSTGRES_SERVER:-db}
  POSTGRES_PORT: ${POSTGRES_PORT:-5432}
  POSTGRES_DB: ${POSTGRES_DB:-postgres}
  SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-app_session}
  SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
  SESSION_COOKIE_DOMAIN: ${SESSION_COOKIE_DOMAIN:-.canada.ca}
  SESSION_MAX_AGE: ${SESSION_MAX_AGE:-28800}
  SESSION_ROLLING: ${SESSION_ROLLING:-false}
  REDIS_SESSION_HOST: ${DOCKER_REDIS_SESSION_HOST:-redis}
  REDIS_SESSION_PORT: ${REDIS_SESSION_PORT:-6379}
  REDIS_SESSION_DB: ${REDIS_SESSION_DB:-1}
  REDIS_SESSION_PASSWORD: ${REDIS_SESSION_PASSWORD:-}
  REDIS_SESSION_SSL: ${REDIS_SESSION_SSL:-false}
  REDIS_SESSION_PREFIX: ${REDIS_SESSION_PREFIX:-app.sessions.}
  REDIS_SESSION_GC_TTL: ${REDIS_SESSION_GC_TTL:-2592000}
  OIDC_ENABLED: ${OIDC_ENABLED:-false}
  OIDC_PROVIDER_NAME: ${OIDC_PROVIDER_NAME:-oidc}
  OIDC_SERVER_METADATA_URL: ${OIDC_SERVER_METADATA_URL:-}
  OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
  OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
  OIDC_SCOPES: ${OIDC_SCOPES:-openid profile email}
  OIDC_REDIRECT_URI: ${OIDC_REDIRECT_URI:-}
  OIDC_REDIRECT_PATH: ${OIDC_REDIRECT_PATH:-/api/v1/auth/oidc/callback}
  OIDC_POST_LOGIN_REDIRECT: ${OIDC_POST_LOGIN_REDIRECT:-/auth-complete}
  OIDC_ACCESS_DENIED_REDIRECT: ${OIDC_ACCESS_DENIED_REDIRECT:-/access-denied}
  OIDC_GROUP_CLAIM_KEY: ${OIDC_GROUP_CLAIM_KEY:-groupIds}
  OIDC_ADMIN_GROUP_NAME: ${OIDC_ADMIN_GROUP_NAME:-admin}
  OIDC_APPLICATION_OWNERS_GROUP_NAME: "${OIDC_APPLICATION_OWNERS_GROUP_NAME:-application owners}"
  CLPP_ADMIN_ROLE_NAME: ${CLPP_ADMIN_ROLE_NAME:-admin}
  CLPP_APPLICATION_OWNERS_ROLE_NAME: "${CLPP_APPLICATION_OWNERS_ROLE_NAME:-application owners}"
  IBM_SV_ADMIN_BASE_URL: ${IBM_SV_ADMIN_BASE_URL:-}
  IBM_SV_ADMIN_CLIENT_ID: ${IBM_SV_ADMIN_CLIENT_ID:-}
  IBM_SV_ADMIN_CLIENT_SECRET: ${IBM_SV_ADMIN_CLIENT_SECRET:-}
  REDIS_CACHE_HOST: ${DOCKER_REDIS_CACHE_HOST:-redis}
  REDIS_CACHE_PORT: ${REDIS_CACHE_PORT:-6379}
  REDIS_CACHE_DB: ${REDIS_CACHE_DB:-}
  REDIS_CACHE_PASSWORD: ${REDIS_CACHE_PASSWORD:-}
  REDIS_CACHE_SSL: ${REDIS_CACHE_SSL:-}
  REDIS_QUEUE_HOST: ${DOCKER_REDIS_QUEUE_HOST:-redis}
  REDIS_QUEUE_PORT: ${REDIS_QUEUE_PORT:-6379}
  REDIS_QUEUE_DB: ${REDIS_QUEUE_DB:-}
  REDIS_QUEUE_PASSWORD: ${REDIS_QUEUE_PASSWORD:-}
  REDIS_QUEUE_SSL: ${REDIS_QUEUE_SSL:-}
  REDIS_RATE_LIMIT_HOST: ${DOCKER_REDIS_RATE_LIMIT_HOST:-redis}
  REDIS_RATE_LIMIT_PORT: ${REDIS_RATE_LIMIT_PORT:-6379}
  REDIS_RATE_LIMIT_DB: ${REDIS_RATE_LIMIT_DB:-}
  REDIS_RATE_LIMIT_PASSWORD: ${REDIS_RATE_LIMIT_PASSWORD:-}
  REDIS_RATE_LIMIT_SSL: ${REDIS_RATE_LIMIT_SSL:-}
  TIMEZONE: ${TIMEZONE:-America/Toronto}
  LOAD_MAU_ENABLED: ${LOAD_MAU_ENABLED:-false}
  START_ARQ_ON_STARTUP: ${START_ARQ_ON_STARTUP:-false}
  DEFAULT_RATE_LIMIT_LIMIT: ${DEFAULT_RATE_LIMIT_LIMIT:-10}
  DEFAULT_RATE_LIMIT_PERIOD: ${DEFAULT_RATE_LIMIT_PERIOD:-3600}
  CORS_ORIGINS: '${CORS_ORIGINS:-["*"]}'
  CORS_METHODS: '${CORS_METHODS:-["*"]}'
  CORS_HEADERS: '${CORS_HEADERS:-["*"]}'
  CLIENT_CACHE_MAX_AGE: ${CLIENT_CACHE_MAX_AGE:-30}
  AWS_S3_REGION: ${AWS_S3_REGION:-ca-central-1}
  AWS_S3_ROLE_ARN: ${AWS_S3_ROLE_ARN:-}
  AWS_S3_PROFILE: ${AWS_S3_PROFILE:-}
  S3_MAU_BUCKET_NAME: ${S3_MAU_BUCKET_NAME:-}
  S3_MAU_FOLDER: ${S3_MAU_FOLDER:-ibm_verify/app_login_counts/}

x-backend-environment: &backend-environment
  <<: *backend-build-args

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args: *backend-build-args
    # -------- Both of the following commands should be commented to run with nginx --------

    # -------- replace with comment to run with gunicorn --------
    command: sh -c "alembic -c /code/alembic.ini upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    # command: gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000
    environment:
      <<: *backend-environment
    # -------- replace ports with expose if you are using nginx --------
    # ports:
    #    - "8000:8000"
    expose:
       - "8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./src/app:/code/app
      - ./src/migrations:/code/migrations
      - ./src/alembic.ini:/code/alembic.ini

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      args: *backend-build-args
    command: arq app.core.worker.settings.WorkerSettings
    environment:
      <<: *backend-environment
      LOAD_MAU_ENABLED: true
      START_ARQ_ON_STARTUP: true
      AWS_ACCESS_KEY_ID: "your_aws_access_key_id"
      AWS_SECRET_ACCESS_KEY: "your_aws_secret_access_key"
      AWS_SESSION_TOKEN: "your_aws_session_token"
      
    depends_on:
      - db
      - redis
    volumes:
      - ./src/app:/code/app

  db:
    image: postgres:13
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    expose:
      - "5432"

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data
    expose:
      - "6379"

  #-------- uncomment to run with nginx --------
  nginx:
    image: nginx:latest
    ports:
      - "8000:8000"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web

  #-------- uncomment to create first superuser --------
  # create_superuser:
  #   build: 
  #     context: .
  #     dockerfile: Dockerfile
  #   env_file:
  #     - ./.env
  #   depends_on:
  #     - db
  #     - web
  #   command: python -m src.scripts.create_first_superuser
  #   volumes:
  #     - ./src:/code/src

  #-------- uncomment to run tests --------
  # pytest:
  #   build: 
  #     context: .
  #     dockerfile: Dockerfile 
  #   env_file:
  #     - ./.env
  #   depends_on:
  #     - web
  #     - redis
  #   command: python -m pytest ./tests
  #   volumes:
  #     - .:/code

  #-------- uncomment to create first tier --------
  # create_tier:
  #   build: 
  #     context: .
  #     dockerfile: Dockerfile
  #   env_file:
  #     - ./.env
  #   depends_on:
  #     - create_superuser
  #     - db
  #     - web
  #   command: python -m src.scripts.create_first_tier
  #   volumes:
  #     - ./src:/code/src

volumes:
